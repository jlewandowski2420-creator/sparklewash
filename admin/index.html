<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkleWash — Beheer</title>
</head>
<body>
  <!-- Manual init so we can register our custom backend BEFORE the CMS boots -->
  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@^3/dist/decap-cms.js"></script>
  <script>
  (function () {
    // ── The built-in "git-gateway" backend speaks the Netlify Identity/GoTrue
    //    protocol, which our PHP gateway does NOT implement. So we register a
    //    custom backend that maps Decap's interface onto the PHP gateway's
    //    endpoints: POST /oauth/auth, GET /oauth/get, POST /oauth/save,
    //    GET /oauth/list  (routed to oauth/gateway.php by .htaccess).
    var GATEWAY = "/oauth";

    // ── Login screen (password → POST /oauth/auth) ───────────────────────────
    var AuthenticationPage = window.createClass({
      getInitialState: function () { return { password: "" }; },
      handleChange: function (e) { this.setState({ password: e.target.value }); },
      handleSubmit: function (e) {
        e.preventDefault();
        this.props.onLogin({ password: this.state.password });
      },
      render: function () {
        var h = window.h;
        return h("section", { style: { display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh", background: "#1a1a2e", fontFamily: "system-ui, sans-serif" } },
          h("form", { onSubmit: this.handleSubmit, style: { background: "#fff", padding: "40px", borderRadius: "12px", boxShadow: "0 10px 40px rgba(0,0,0,.3)", width: "320px", textAlign: "center" } },
            h("h1", { style: { margin: "0 0 6px", fontSize: "22px" } }, "⚡ SparkleWash"),
            h("p", { style: { margin: "0 0 20px", color: "#666", fontSize: "14px" } }, "Log in om de website te beheren"),
            this.props.error ? h("p", { style: { color: "#c0392b", fontSize: "13px", margin: "0 0 12px" } }, String(this.props.error)) : null,
            h("input", { type: "password", placeholder: "Wachtwoord", value: this.state.password, onChange: this.handleChange, autoFocus: true, style: { width: "100%", padding: "12px", margin: "0 0 16px", border: "1px solid #ddd", borderRadius: "8px", boxSizing: "border-box", fontSize: "15px" } }),
            h("button", { type: "submit", disabled: this.props.inProgress, style: { width: "100%", padding: "12px", background: "#0f3460", color: "#fff", border: "none", borderRadius: "8px", fontSize: "15px", cursor: "pointer" } }, this.props.inProgress ? "Bezig…" : "Inloggen")
          )
        );
      }
    });

    // ── Custom backend ───────────────────────────────────────────────────────
    function SparkleWashGateway(config, options) {
      this.config = config;
      this.options = options || {};
      this.token = null;
    }

    SparkleWashGateway.prototype.isGitBackend = function () { return false; };
    SparkleWashGateway.prototype.status = function () {
      return Promise.resolve({ auth: { status: true }, api: { status: true, statusPage: "" } });
    };

    // Auth
    SparkleWashGateway.prototype.authComponent = function () { return AuthenticationPage; };
    SparkleWashGateway.prototype.restoreUser = function (user) {
      this.token = user && user.token;
      return Promise.resolve(user);
    };
    SparkleWashGateway.prototype.authenticate = function (credentials) {
      var self = this;
      return fetch(GATEWAY + "/auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password: credentials.password })
      }).then(function (res) {
        return res.json().catch(function () { return {}; }).then(function (data) {
          if (!res.ok) throw new Error(data.error || "Inloggen mislukt");
          self.token = data.token;
          return { token: data.token, name: data.user || "admin", backendName: "sparklewash-gateway" };
        });
      });
    };
    SparkleWashGateway.prototype.logout = function () { this.token = null; return null; };
    SparkleWashGateway.prototype.getToken = function () { return Promise.resolve(this.token); };

    // Low-level gateway calls
    SparkleWashGateway.prototype._get = function (path) {
      var self = this;
      return fetch(GATEWAY + "/get?path=" + encodeURIComponent(path), {
        headers: { Authorization: "Bearer " + self.token }
      }).then(function (res) {
        if (res.status === 404) return null;
        if (!res.ok) throw new Error("Kon bestand niet laden: " + path);
        return res.json(); // { content, sha }
      });
    };
    SparkleWashGateway.prototype._save = function (path, content, sha, message) {
      return fetch(GATEWAY + "/save", {
        method: "POST",
        headers: { "Content-Type": "application/json", Authorization: "Bearer " + this.token },
        body: JSON.stringify({ path: path, content: content, sha: sha || null, message: message || "CMS update" })
      }).then(function (res) {
        if (!res.ok) throw new Error("Opslaan mislukt: " + path);
        return res.json();
      });
    };

    // Reads — Decap uses entriesByFiles for "files" collections
    SparkleWashGateway.prototype.entriesByFiles = function (files) {
      var self = this;
      return Promise.all(files.map(function (file) {
        return self._get(file.path).then(function (r) {
          return { file: file, data: r ? r.content : "{}" };
        });
      }));
    };
    SparkleWashGateway.prototype.entriesByFolder = function (folder, extension) {
      var self = this;
      return fetch(GATEWAY + "/list?path=" + encodeURIComponent(folder), {
        headers: { Authorization: "Bearer " + self.token }
      }).then(function (res) { return res.ok ? res.json() : []; })
        .then(function (items) {
          items = (items || []).filter(function (f) {
            return !extension || f.name.slice(-("." + extension).length) === "." + extension;
          });
          return Promise.all(items.map(function (f) {
            return self._get(f.path).then(function (r) {
              return { file: { path: f.path, id: f.sha }, data: r ? r.content : "{}" };
            });
          }));
        });
    };
    SparkleWashGateway.prototype.allEntriesByFolder = function (folder, extension, depth) {
      return this.entriesByFolder(folder, extension, depth);
    };
    SparkleWashGateway.prototype.getEntry = function (path) {
      return this._get(path).then(function (r) {
        return { file: { path: path, id: r ? r.sha : null }, data: r ? r.content : "{}" };
      });
    };

    // Writes — fetch current sha first (GitHub requires it to update)
    SparkleWashGateway.prototype.persistEntry = function (entry, options) {
      var self = this;
      var files = entry.dataFiles || (entry.path ? [{ path: entry.path, raw: entry.raw }] : []);
      var msg = (options && options.commitMessage) || "CMS update";
      return files.reduce(function (chain, dataFile) {
        return chain.then(function () {
          return self._get(dataFile.path).then(function (r) {
            return self._save(dataFile.path, dataFile.raw, r ? r.sha : null, msg);
          });
        });
      }, Promise.resolve()).then(function () {
        if (entry.assets && entry.assets.length) {
          throw new Error("Media-uploads worden niet ondersteund door deze gateway.");
        }
      });
    };

    // Media — none of the configured fields use media, so keep it minimal
    SparkleWashGateway.prototype.getMedia = function () { return Promise.resolve([]); };
    SparkleWashGateway.prototype.getMediaFile = function (path) {
      return Promise.resolve({ id: path, name: path.split("/").pop(), path: path, url: path, displayURL: path });
    };
    SparkleWashGateway.prototype.persistMedia = function () {
      return Promise.reject(new Error("Media-uploads worden niet ondersteund door deze gateway."));
    };
    SparkleWashGateway.prototype.deleteFiles = function () {
      return Promise.reject(new Error("Verwijderen wordt niet ondersteund door deze gateway."));
    };

    // Cursor / editorial-workflow stubs (simple workflow → not really used)
    SparkleWashGateway.prototype.traverseCursor = function () { return Promise.resolve({ entries: [], cursor: null }); };
    SparkleWashGateway.prototype.unpublishedEntries = function () { return Promise.resolve([]); };
    SparkleWashGateway.prototype.unpublishedEntry = function () { return Promise.reject(new Error("Not supported")); };
    SparkleWashGateway.prototype.getDeployPreview = function () { return Promise.resolve(null); };

    // ── Register + boot ────────────────────────────────────────────────────────
    CMS.registerBackend("sparklewash-gateway", SparkleWashGateway);

    CMS.init({
      config: {
        backend: {
          name: "sparklewash-gateway",
          repo: "jlewandowski2420-creator/sparklewash",
          branch: "main"
        },
        load_config_file: false,
        media_folder: "assets/images",
        public_folder: "/assets/images",
        site_url: "https://sparklewash.nl",
        locale: "nl",
        collections: [{
          name: "content",
          label: "⚡ SparkleWash CMS",
          files: [
            { name: "hero", label: "🏠 Hero sectie", file: "data/hero.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "subtitle", label: "Subtitel", widget: "string" },
              { name: "cta", label: "Knop", widget: "string" }
            ]},
            { name: "carpet", label: "🧹 Tapijtreiniging", file: "data/service-carpet.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "desc", label: "Beschrijving", widget: "text" },
              { name: "price", label: "Prijs", widget: "string" },
              { name: "unit", label: "Per", widget: "string" }
            ]},
            { name: "sofa", label: "🛋️ Bankreiniging", file: "data/service-sofa.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "desc", label: "Beschrijving", widget: "text" },
              { name: "price", label: "Prijs", widget: "string" },
              { name: "unit", label: "Per", widget: "string" }
            ]},
            { name: "mattress", label: "🛏️ Matrasreiniging", file: "data/service-mattress.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "desc", label: "Beschrijving", widget: "text" },
              { name: "price", label: "Prijs", widget: "string" },
              { name: "unit", label: "Per", widget: "string" }
            ]},
            { name: "car", label: "🚗 Auto interieur", file: "data/service-car.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "desc", label: "Beschrijving", widget: "text" },
              { name: "price", label: "Prijs", widget: "string" },
              { name: "unit", label: "Per", widget: "string" }
            ]},
            { name: "about", label: "👤 Over SparkleWash", file: "data/about.json", fields: [
              { name: "title", label: "Titel", widget: "string" },
              { name: "text", label: "Tekst", widget: "text" }
            ]},
            { name: "contact", label: "📞 Contact", file: "data/contact.json", fields: [
              { name: "phone", label: "Telefoon", widget: "string" },
              { name: "email", label: "E-mail", widget: "string" }
            ]}
          ]
        }]
      }
    });
  })();
  </script>
</body>
</html>
