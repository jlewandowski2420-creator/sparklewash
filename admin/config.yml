backend:
  name: git-gateway
  branch: main
  identity_url: https://sparklewash.nl/oauth/gateway.php
  gateway_url: https://sparklewash.nl/oauth/gateway.php

media_folder: "assets/images"
public_folder: "/assets/images"
site_url: https://sparklewash.nl
display_url: https://sparklewash.nl

locale: nl

collections:
  - name: "content"
    label: "⚡ SparkleWash"
    files:
      - name: "hero"
        label: "🏠 Hero sectie"
        file: "data/hero.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Professionele tapijt- & meubelreiniging" }
          - { name: "subtitle", label: "Subtitel", widget: "string", default: "Wij komen naar u toe in Limburg en omgeving" }
          - { name: "cta", label: "Knop tekst", widget: "string", default: "Offerte aanvragen" }

      - name: "services_title"
        label: "🧹 Diensten — titel"
        file: "data/services.json"
        fields:
          - { name: "title", label: "Sectie titel", widget: "string", default: "Onze diensten" }
          - { name: "subtitle", label: "Sectie subtitel", widget: "string", default: "Waar kunnen we u mee helpen?" }

      - name: "service_carpet"
        label: "🧹 Tapijtreiniging"
        file: "data/service-carpet.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Tapijtreiniging" }
          - { name: "desc", label: "Beschrijving", widget: "text" }
          - { name: "price", label: "Prijs", widget: "string", default: "€35" }
          - { name: "unit", label: "Per", widget: "string", default: "/m²" }

      - name: "service_sofa"
        label: "🛋️ Bankreiniging"
        file: "data/service-sofa.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Bankreiniging" }
          - { name: "desc", label: "Beschrijving", widget: "text" }
          - { name: "price", label: "Prijs", widget: "string", default: "€75" }
          - { name: "unit", label: "Per", widget: "string", default: "/zitplaats" }

      - name: "service_mattress"
        label: "🛏️ Matrasreiniging"
        file: "data/service-mattress.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Matrasreiniging" }
          - { name: "desc", label: "Beschrijving", widget: "text" }
          - { name: "price", label: "Prijs", widget: "string", default: "€60" }
          - { name: "unit", label: "Per", widget: "string" }

      - name: "service_car"
        label: "🚗 Auto interieur"
        file: "data/service-car.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Auto interieur reiniging" }
          - { name: "desc", label: "Beschrijving", widget: "text" }
          - { name: "price", label: "Prijs", widget: "string", default: "€95" }
          - { name: "unit", label: "Per", widget: "string" }

      - name: "about"
        label: "👤 Over ons"
        file: "data/about.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Over SparkleWash" }
          - { name: "text", label: "Tekst", widget: "markdown", default: "SparkleWash is uw specialist…" }

      - name: "area"
        label: "📍 Werkgebied"
        file: "data/area.json"
        fields:
          - { name: "title", label: "Titel", widget: "string", default: "Werkgebied" }
          - { name: "text", label: "Tekst", widget: "text" }

      - name: "contact"
        label: "📞 Contact"
        file: "data/contact.json"
        fields:
          - { name: "phone", label: "Telefoon", widget: "string", default: "+31 6 12345678" }
          - { name: "email", label: "E-mail", widget: "string", default: "info@sparklewash.nl" }
          - { name: "address", label: "Adres", widget: "text" }
